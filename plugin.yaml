name: kb_journeys
version: 0.10.4
description: "Compact Hermes KB journeys backed by generated kb-engine contracts."
author: "Hermes Agent"
provides_hooks:
  - post_tool_call
  - pre_gateway_dispatch
  - pre_api_request
  - post_llm_call
  - transform_tool_result
descriptor_bundle: generated/kb-engine-descriptors.json
install_receipt:
  owner: noc
  schema_version: 1
  required_fields:
    - current_ref
    - previous_ref
    - installed_digest
    - descriptor_digest
    - installed_at
    - noc_plan_digest
  rollback_ref_field: previous_ref
migrations:
  - version: 0.5.0
    hard_break: "/kb sync is temporarily unavailable until kb.sync.prepare/commit; /kbsync and update_kb are removed"
  - version: 0.6.0
    hard_break: "/kb sync uses kb.sync.prepare/status/resume; /kbsync, update_kb, and /kb run sync remain removed"
  - version: 0.7.0
    hard_break: "/kb sync apply replaces /kb sync confirm; normal bounded sync uses standing safe-write authorization"
  - version: 0.8.0
    hard_break: "User cards are compact; publication is a trusted-operator handoff; plain kb sync uses the canonical journey"
  - version: 0.9.0
    hard_break: "kb_integration_transport replaces kb_sync_resume_packet and adds the protected Daily Integration calendar/publication closeout"
  - version: 0.9.1
    hard_break: "kb_integration_transport adds bounded semantic batches without adding another Hermes tool"
  - version: 0.9.2
    hard_break: "oversized single-target semantic dossiers are exposed through exact bounded evidence pages"
  - version: 0.9.3
    hard_break: "oversized single-evidence semantic bodies are exposed through exact lossless text pages"
  - version: 0.9.4
    hard_break: "oversized evidence bodies inside target dossiers are exposed through the same exact text pages"
  - version: 0.9.5
    hard_break: "target continuation pages retain exact bindings without repeating page-one schema and object context"
  - version: 0.9.6
    hard_break: "generated kb-engine 0.45.38 contracts expose bounded oversized-target evidence-summary checkpoints"
  - version: 0.9.7
    hard_break: "Daily Integration closeout accepts only fully accounted non-retryable item-level source insufficiency"
  - version: 0.10.0
    hard_break: "the existing integration transport adds bounded read-only context search for ordinary prep and planning"
  - version: 0.10.1
    hard_break: "kb publish restores exact preview plus explicit confirmation through the strict kb-engine publication journey"
  - version: 0.10.2
    hard_break: "Source Access packet transport makes the complete digest-and-size descriptor authoritative; bare kb-sync-gather paths remain explicitly deprecated compatibility only"
  - version: 0.10.3
    hard_break: "generated kb-engine dispatch follows the running Hermes MCP registry naming convention while preserving exact accepted-packet cleanup"
  - version: 0.10.4
    hard_break: "oversized target review invariants use a bounded context-only proof page before direct evidence continuation at the returned offset"
