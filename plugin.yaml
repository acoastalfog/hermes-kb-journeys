name: kb_journeys
version: 0.9.0
description: "Compact Hermes KB journeys backed by generated kb-engine contracts."
author: "Hermes Agent"
provides_hooks:
  - post_tool_call
  - pre_gateway_dispatch
  - pre_api_request
  - post_llm_call
  - transform_tool_result
descriptor_bundle: generated/kb-engine-descriptors.json
install_receipt:
  owner: noc
  schema_version: 1
  required_fields:
    - current_ref
    - previous_ref
    - installed_digest
    - descriptor_digest
    - installed_at
    - noc_plan_digest
  rollback_ref_field: previous_ref
migrations:
  - version: 0.5.0
    hard_break: "/kb sync is temporarily unavailable until kb.sync.prepare/commit; /kbsync and update_kb are removed"
  - version: 0.6.0
    hard_break: "/kb sync uses kb.sync.prepare/status/resume; /kbsync, update_kb, and /kb run sync remain removed"
  - version: 0.7.0
    hard_break: "/kb sync apply replaces /kb sync confirm; normal bounded sync uses standing safe-write authorization"
  - version: 0.8.0
    hard_break: "User cards are compact; publication is a trusted-operator handoff; plain kb sync uses the canonical journey"
  - version: 0.9.0
    hard_break: "kb_integration_transport replaces kb_sync_resume_packet and adds the protected Daily Integration calendar/publication closeout"
