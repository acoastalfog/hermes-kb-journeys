name: kb_journeys
version: 0.6.0
description: "Telegram-native KB status, sync, and review cards backed by generated kb-engine contracts."
author: "Hermes Agent"
provides_hooks:
  - pre_gateway_dispatch
  - post_llm_call
descriptor_bundle: generated/kb-engine-descriptors.json
install_receipt:
  owner: noc
  schema_version: 1
  required_fields:
    - current_ref
    - previous_ref
    - installed_digest
    - descriptor_digest
    - installed_at
    - noc_plan_digest
  rollback_ref_field: previous_ref
migrations:
  - version: 0.5.0
    hard_break: "/kb sync is temporarily unavailable until kb.sync.prepare/commit; /kbsync and update_kb are removed"
  - version: 0.6.0
    hard_break: "/kb sync uses kb.sync.prepare/status/resume; /kbsync, update_kb, and /kb run sync remain removed"
