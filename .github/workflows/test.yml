name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract:
    env:
      KB_ENGINE_DESCRIPTOR_REF: f6de2f79eb3759bc0c7158783a3d975bc55f8eac
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hermes_ref:
          - v2026.6.19
          - main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ matrix.hermes_ref }}
          path: hermes-agent
      - name: Fetch exact pinned kb-engine descriptor source
        shell: bash
        run: |
          git init kb-engine
          git -C kb-engine remote add origin https://github.com/acoastalfog/kb-engine.git
          if ! git -C kb-engine fetch --depth=1 origin "$KB_ENGINE_DESCRIPTOR_REF"; then
            echo "::error::Pinned kb-engine descriptor revision $KB_ENGINE_DESCRIPTOR_REF is not published. H1 CI is intentionally blocked until the coordinated K3 ref is reachable."
            exit 1
          fi
          git -C kb-engine checkout --detach FETCH_HEAD
          test "$(git -C kb-engine rev-parse HEAD)" = "$KB_ENGINE_DESCRIPTOR_REF"
      - uses: astral-sh/setup-uv@v6
      - name: Verify generated descriptors
        env:
          KB_ENGINE_SOURCE: ${{ github.workspace }}/kb-engine
        run: |
          cp generated/kb-engine-descriptors.json /tmp/committed-kb-engine-descriptors.json
          scripts/refresh-descriptors.sh
          diff -u /tmp/committed-kb-engine-descriptors.json generated/kb-engine-descriptors.json
      - name: Test against Hermes ${{ matrix.hermes_ref }}
        env:
          HERMES_AGENT_REPO: ${{ github.workspace }}/hermes-agent
          HERMES_UPSTREAM_REF: ${{ matrix.hermes_ref }}
        run: uv run --with pytest --with pyyaml pytest tests/test_external_plugin_contract.py -q
