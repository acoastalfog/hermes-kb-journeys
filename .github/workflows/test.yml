name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract:
    env:
      KB_ENGINE_DESCRIPTOR_REF: 47ef70cb7e5986882018a479385b1cafcdedc13b
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        hermes_ref:
          - v2026.6.19
          - main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ matrix.hermes_ref }}
          path: hermes-agent
      - name: Checkout exact pinned kb-engine descriptor source
        uses: actions/checkout@v4
        with:
          repository: acoastalfog/kb-engine
          ref: ${{ env.KB_ENGINE_DESCRIPTOR_REF }}
          path: kb-engine
          ssh-key: ${{ secrets.KB_ENGINE_DEPLOY_KEY }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@v6
      - name: Verify generated descriptors
        env:
          KB_ENGINE_SOURCE: ${{ github.workspace }}/kb-engine
        run: |
          cp generated/kb-engine-descriptors.json /tmp/committed-kb-engine-descriptors.json
          scripts/refresh-descriptors.sh
          diff -u /tmp/committed-kb-engine-descriptors.json generated/kb-engine-descriptors.json
      - name: Test against Hermes ${{ matrix.hermes_ref }}
        env:
          HERMES_AGENT_REPO: ${{ github.workspace }}/hermes-agent
          HERMES_UPSTREAM_REF: ${{ matrix.hermes_ref }}
        run: uv run --with pytest --with pyyaml pytest tests/test_external_plugin_contract.py -q

  h1-owner-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: v2026.6.19
          path: hermes-agent
      - uses: astral-sh/setup-uv@v6
      - name: Run exact H1 owner-evidence contracts
        env:
          HERMES_AGENT_REPO: ${{ github.workspace }}/hermes-agent
          HERMES_UPSTREAM_REF: v2026.6.19
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          mkdir -p artifacts
          uv run --with pytest --with pyyaml pytest -q \
            tests/test_h1_owner_evidence.py \
            tests/test_external_plugin_contract.py::test_generated_descriptor_bundle_is_strict_and_legacy_free \
            tests/test_external_plugin_contract.py::test_conforming_concrete_output_fixture_loads \
            tests/test_external_plugin_contract.py::test_descriptor_validation_recomputes_schema_digests \
            tests/test_external_plugin_contract.py::test_optimistic_confirm_without_readback_never_renders_durable_success \
            tests/test_external_plugin_contract.py::test_durable_completion_requires_generated_request_binding_in_addition_to_readback \
            tests/test_external_plugin_contract.py::test_generated_completion_binding_proves_only_the_exact_selected_request \
            tests/test_external_plugin_contract.py::test_evidence_completion_requires_digest_bound_readback \
            tests/test_external_plugin_contract.py::test_kb_sync_is_typed_unavailable_and_dispatches_nothing \
            tests/test_external_plugin_contract.py::test_dispatch_first_skips_every_non_allowlisted_tool \
            tests/test_external_plugin_contract.py::test_runtime_rejects_more_than_twelve_effective_tools \
            tests/test_external_plugin_contract.py::test_upstream_env_status_renders_plain_text \
            tests/test_external_plugin_contract.py::test_upstream_env_today_renders_plain_text \
            tests/test_external_plugin_contract.py::test_upstream_env_readiness_reports_text_only_degraded \
            tests/test_external_plugin_contract.py::test_upstream_env_text_delivery_drops_unavailable_buttons \
            --junitxml=artifacts/h1-owner-evidence-v2026.6.19.xml
      - name: Retain non-admissible H1 test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h1-owner-evidence-v2026.6.19
          path: artifacts/h1-owner-evidence-v2026.6.19.xml
          if-no-files-found: error
          retention-days: 14
