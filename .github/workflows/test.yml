name: terminal-retirement

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  tombstone:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prove repository is not installable
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          grep -q 'terminally deprecated' README.md
          for path in plugin.yaml pyproject.toml __init__.py generated scripts tests; do
            test ! -e "$path"
          done
          expected=$'.github/workflows/test.yml\n.gitignore\nREADME.md'
          test "$(git ls-files | sort)" = "$expected"
